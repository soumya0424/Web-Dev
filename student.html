<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #000;
            text-align: center;
            padding: 8px;
        }
        th {
            background-color: #f4f4f4;
        }
        caption {
            margin-bottom: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Student Details</h1>
    <table>
        <caption>Table Name: Student</caption>
        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>15</td>
                <td>T. Mitra</td>
                <td>12</td>
                <td>A</td>
            </tr>
            <tr>
                <td>37</td>
                <td>A. Mahato</td>
                <td>12</td>
                <td>B</td>
            </tr>
            <tr>
                <td>81</td>
                <td>Md. Hanif</td>
                <td>12</td>
                <td>C</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
