<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Test Routine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #000;
            text-align: center;
            padding: 8px;
        }
        th {
            background-color: #f4f4f4;
        }
        caption {
            margin-bottom: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Unit Test Routine</h1>
    <table>
        <caption>Table Name: Unit Test Routine</caption>
        <thead>
            <tr>
                <th>Date</th>
                <th>Duration</th>
                <th>Subject</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">11.09.2024</td>
                <td>2 hr</td>
                <td>Physics</td>
            </tr>
            <tr>
                <td>1 hr</td>
                <td>History</td>
            </tr>
            <tr>
                <td rowspan="2">13.09.2020</td>
                <td>1 hr</td>
                <td>Computer</td>
            </tr>
            <tr>
                <td>2 hr</td>
                <td>Accountancy</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
