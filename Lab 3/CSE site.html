<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh; 
            display: flex;
        }

        header {
            background-image: url('ocean.jpg'); 
            background-size: cover;
            background-position: center;
            height: 150px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: gray;
        }

        header img {
            width: 50px;
            height: 50px;
            margin-right: 20px;
        }

        header h1 {
            margin: 0;
        }

        .sidebar {
            width: 200px;
            background-color: #FFD9B3; 
            color: #800000; 
            padding: 20px;
            height: calc(100vh - 150px); 
            box-sizing: border-box; 
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 15px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #800000; 
            font-weight: bold;
        }

        .content {
            flex: 1; 
            padding: 20px;
            background-image: url('beige.jpg'); 
            background-size: cover; 
            background-position: center;
            color: black; 
            box-sizing: border-box;
        }

        .content h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .content p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div style="width: 100%;">
        <!-- Header -->
        <header>
            <img src="images.png" alt="Logo">
            <h1>School of Computer Science</h1>
        </header>

        <div style="display: flex;">
            <div class="sidebar">
                <ul>
                    <li><a href="about.html" target="contentFrame">About Us</a></li>
                    <li><a href="programs.html" target="contentFrame">Programs</a></li>
                    <li><a href="faculty.html" target="contentFrame">Faculty</a></li>
                    <li><a href="contact.html" target="contentFrame">Contact Us</a></li>
               </ul>
            </div>

            <!-- Content -->
            <div class="content">
                <p>Welcome to the School of Computer Science!</p>
            </div>
        </div>
    </div>
</body>
</html>
