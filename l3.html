<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-image: url('ocean.jpg');
            background-size: cover;
            background-position: center;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: gray;
        }

        header img {
            width: 50px;
            height: 50px;
            margin-right: 20px;
        }

        header h1 {
            margin: 0;
        }

        .container {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 200px;
            background-color: #FFD9B3;
            color: #800000;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 15px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #800000;
            font-weight: bold;
        }

        .content {
            flex: 1;
            padding: 20px;
            background-image: url('beige.jpg');
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
        }

        .content p {
            margin: 0;
        }

        /* Popup styles */
        #popupForm {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            padding: 20px;
            background-color: white;
            border: 2px solid black;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #popupForm div {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #popupForm .left img {
            max-width: 100%;
        }

        #popupForm label {
            display: inline-block;
            margin-bottom: 5px;
        }

        #popupForm input[type="checkbox"],
        #popupForm input[type="radio"] {
            margin-right: 5px;
            vertical-align: middle;
        }

        #popupForm .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #popupForm .checkbox-group label {
            display: flex;
            align-items: center;
        }

        #popupForm button {
            margin-right: 10px;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
    <script>
        function openForm() {
            document.getElementById('popupForm').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeForm() {
            document.getElementById('popupForm').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</head>
<body>
    <div id="overlay" onclick="closeForm()"></div>
    <!-- Header -->
    <header>
        <div style="display: flex; align-items: center;">
            <img src="images.png" alt="Logo">
            <h1>School of Computer Science</h1>
        </div>
        <button onclick="openForm()">Open Form</button>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <ul>
                <li><a href="about.html" target="contentFrame">About Us</a></li>
                <li><a href="programs.html" target="contentFrame">Programs</a></li>
                <li><a href="faculty.html" target="contentFrame">Faculty</a></li>
                <li><a href="contact.html" target="contentFrame">Contact Us</a></li>
            </ul>
        </div>

        <!-- Content -->
        <div class="content">
            <p>Welcome to the School of Computer Science!</p>
        </div>
    </div>

    <!-- Popup Form -->
    <div id="popupForm">
        <form action="anotherpage.html" method="POST">
            <div>
                <!-- Left Column -->
                <div class="left">
                    <img src="image-placeholder.png" alt="Image" style="max-width: 100px; margin: 0 auto;">
                </div>
                <!-- Right Column -->
                <div class="right">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="rollno">Roll No:</label>
                    <input type="text" id="rollno" name="rollno" required>

                    <label>Gender:</label>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <label>Engineering Streams:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="cse" name="stream" value="cse"> CSE</label>
                        <label><input type="checkbox" id="ece" name="stream" value="ece"> ECE</label>
                        <label><input type="checkbox" id="civil" name="stream" value="civil"> Civil</label>
                    </div>

                    <label for="semester">Choose Semester:</label>
                    <select id="semester" name="semester">
                        <optgroup label="First Year">
                            <option value="sem1">Semester 1</option>
                            <option value="sem2">Semester 2</option>
                        </optgroup>
                        <optgroup label="Second Year">
                            <option value="sem3">Semester 3</option>
                            <option value="sem4">Semester 4</option>
                        </optgroup>
                        <optgroup label="Third Year">
                            <option value="sem5">Semester 5</option>
                            <option value="sem6">Semester 6</option>
                        </optgroup>
                        <optgroup label="Fourth Year">
                            <option value="sem7">Semester 7</option>
                            <option value="sem8">Semester 8</option>
                        </optgroup>
                    </select>

                    <label for="comments">Comments:</label>
                    <textarea id="comments" name="comments" rows="4" cols="30"></textarea>

                    <button type="submit">Submit</button>
                    <button type="reset" onclick="closeForm()">Cancel</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
