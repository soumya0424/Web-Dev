<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Width Header Background</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; 
            padding: 0; 
        }

        header {
            background-image: url('ocean.jpg');
            background-size: cover;                 
            background-position: center;            
            height: 150px;                          
            display: flex;                          
            align-items: center;                    
            padding: 0 20px;                        
            color: gray;                           
        }

        header img {
            width: 50px;        
            height: 50px;       
            margin-right: 20px; 
        }

        header h1 {
            margin: 0;          
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 200px;
            background-color: #DADADA;
            padding: 10px;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin-bottom: 10px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #065A00;
            font-weight: bold;
        }

        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <img src="images.png" alt="Logo">
        <h1>School of Computer Science</h1>
    </header>
    <div class="container">
        <div class="sidebar">
            <ul>
                <li><a href="#about">About Us</a></li>
                <li><a href="#programs">Programs</a></li>
                <li><a href="#faculty">Faculty</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </div>
        <div class="content">
            <p>Welcome to the School of Computer Science!</p>
        </div>
    </div>
</body>
</html>
